# Copy to inventory.ini and edit. One or more Debian/Ubuntu hosts reachable over
# SSH. The playbook installs Docker and runs the TakoIA container.
#
#   cp deploy/ansible/inventory.example.ini deploy/ansible/inventory.ini
#   ansible-playbook -i deploy/ansible/inventory.ini deploy/ansible/playbook.yml

[takoia]
takoia-host-1 ansible_host=REPLACE_ME_IP_OR_DNS

[takoia:vars]
ansible_user=REPLACE_ME_SSH_USER
ansible_ssh_private_key_file=~/.ssh/id_ed25519
# If the SSH user needs a sudo password, pass --ask-become-pass to ansible-playbook,
# or set: ansible_become_password=REPLACE_ME  (prefer ansible-vault for this).
