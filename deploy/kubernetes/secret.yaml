# Secrets for TakoIA. Replace the placeholders below, OR delete this file and
# create the Secret imperatively (recommended, keeps secrets out of git):
#
#   kubectl create secret generic takoia-secrets \
#     --namespace takoia \
#     --from-literal=MASTER_KEY="$(openssl rand -base64 32)" \
#     --from-literal=ADMIN_PASSWORD="REPLACE_ME"
#
# MASTER_KEY must be the base64 of 32 random bytes (`openssl rand -base64 32`).
# stringData lets you paste plain text; Kubernetes base64-encodes it for you.
apiVersion: v1
kind: Secret
metadata:
  name: takoia-secrets
  namespace: takoia
type: Opaque
stringData:
  # `openssl rand -base64 32`
  MASTER_KEY: "REPLACE_ME_openssl_rand_base64_32"
  ADMIN_PASSWORD: "REPLACE_ME"
  # Optional: paste a `claude setup-token` value to use real Claude (else demo mode).
  # CLAUDE_MAX_TOKEN: "REPLACE_ME_claude_setup_token"
