apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Apply everything with:  kubectl apply -k deploy/kubernetes
resources:
  - namespace.yaml
  - secret.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

