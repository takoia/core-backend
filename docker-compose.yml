# One command to try TakoIA:  docker compose up --build
# Open http://localhost:8080  →  first visit asks you to create your admin account.
#
# Runs in demo mode (no Claude / no ICM needed): agent runs complete with offline
# canned content and SQLite-backed memory. To use real Claude, set CLAUDE_MAX_TOKEN.
#
# Postgres is optional and OFF by default (the app uses embedded SQLite). Enable
# it with the `postgres` profile if you ever switch DATABASE_URL.
services:
  app:
    build: .
    container_name: takoia
    ports:
      - "8080:8080"
    environment:
      # Set MASTER_KEY to keep encrypted connectors across restarts; if omitted an
      # ephemeral one is generated at startup.
      # MASTER_KEY: "<openssl rand -base64 32>"
      # No ADMIN_PASSWORD: the first visit opens a setup wizard to create the
      # admin account (no shared default password). Set ADMIN_USERNAME +
      # ADMIN_PASSWORD here to seed it non-interactively instead.
      # ADMIN_USERNAME: admin
      # ADMIN_PASSWORD: "change-me"
      # CLAUDE_MAX_TOKEN: ""   # paste a `claude setup-token` value for real Claude
    volumes:
      - takoia-data:/app/data

  postgres:
    image: postgres:18-alpine
    container_name: takoia-postgres
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: takoia
      POSTGRES_PASSWORD: takoia
      POSTGRES_DB: takoia
    ports:
      - "5432:5432"
    volumes:
      - takoia-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U takoia"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  takoia-data:
  takoia-pg-data:
